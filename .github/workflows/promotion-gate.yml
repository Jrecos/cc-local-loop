name: promotion-gate
on:
  pull_request:
    paths: ['.specify/extensions/ccloop/references/lessons.md', 'specs/**/ccloop/promoted.jsonl']
jobs:
  whitelist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: sudo apt-get update && sudo apt-get install -y jq
      - name: whitelist gate (no yardstick / harness edits)
        run: bash .specify/extensions/ccloop/scripts/bash/promote-check.sh "origin/${{ github.base_ref }}"
