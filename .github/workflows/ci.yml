name: ci
on: [push, pull_request]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq shellcheck
      - name: JSON valid
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json evals/calibration/cases.json; do
            jq -e . "$f" >/dev/null && echo "ok $f"
          done
      - name: bash syntax
        run: for s in scripts/*.sh scripts/harness/*.sh; do bash -n "$s" && echo "ok $s"; done
      - name: lessons.md cap + provenance (G4)
        run: bash scripts/lessons-lint.sh
      - name: shellcheck
        run: shellcheck -S warning scripts/*.sh scripts/harness/*.sh || true
      - name: regression net
        run: bash tests/run-tests.sh
